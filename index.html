<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Capicua</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#63c7e8;
    color:#003344;
}


.header {
    background:#005b75;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}


.connection {
    display:flex;
    justify-content:center;
    gap:15px;
    margin:12px;
    flex-wrap:wrap;
}


.conn {
    background:white;
    padding:8px 12px;
    border-radius:12px;
    font-weight:bold;
}


.led {
    width:12px;
    height:12px;
    display:inline-block;
    border-radius:50%;
    background:red;
    margin-right:5px;
}


.card {
    background:white;
    margin:8px;
    padding:10px;
    border-radius:14px;
    text-align:center;
    box-shadow:0 2px 5px #777;
}


.title {
    font-size:13px;
    color:#006080;
    font-weight:bold;
}


.value {
    font-size:25px;
    font-weight:bold;
    color:#008000;
    margin-top:5px;
}


.row {
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}


.row .card {
    flex:1;
    min-width:90px;
}


.alarm {
    color:red !important;
}


.button {
    background:#006080;
    color:white;
    cursor:pointer;
}


.button.on {
    background:#00aa55;
}


.button.off {
    background:#555;
}


.statusGPS {
    font-weight:bold;
    color:#008000;
}


</style>

</head>


<body>


<div class="header">
⛵ PANEL CAPICUA
</div>



<div class="connection">

<div class="conn">
<span id="ledWifi" class="led"></span>
WiFi ESP32
</div>


<div class="conn">
<span id="ledMQTT" class="led"></span>
MQTT ESP32
</div>


<div class="conn">
<span id="ledBT" class="led"></span>
Bluetooth MiniPlex
</div>

</div>



<!-- GPS -->

<div class="card">

<div class="title">GPS</div>


<div class="row">


<div class="card">

<div class="title">
LATITUD
</div>

<div class="value" id="lat">
--
</div>

</div>


<div class="card">

<div class="title">
LONGITUD
</div>

<div class="value" id="lon">
--
</div>

</div>


</div>


<div id="gps" class="statusGPS">
--
</div>


</div>



<!-- VIENTO -->

<div class="row">


<div class="card">

<div class="title">
VIENTO
</div>

<div class="value">
<span id="wind">
--
</span> kt
</div>

</div>



<div class="card">

<div class="title">
ANGULO
</div>

<div class="value">
<span id="angle">
--
</span>°
</div>

</div>


<div class="card">

<div class="title">
PROFUNDIDAD
</div>

<div class="value">
<span id="depth">
--
</span> m
</div>

</div>


</div>



<!-- BATERIAS -->

<div class="row">


<div class="card">

<div class="title">
MOTOR
</div>

<div class="value" id="bat_m">
--
</div>

</div>



<div class="card">

<div class="title">
SERVICIO
</div>

<div class="value" id="bat_s">
--
</div>

</div>



<div class="card">

<div class="title">
PROA
</div>

<div class="value" id="bat_b">
--
</div>

</div>


</div>



<!-- TEMPERATURA -->

<div class="card">

<div class="title">
TEMPERATURA AGUA
</div>


<div class="value">

<span id="temp">
--
</span> °C

</div>

</div><script>


const client =
mqtt.connect("wss://broker.hivemq.com:8884/mqtt");



client.on("connect",()=>{

    client.subscribe("boat/data");

    document.body.style.borderTop =
    "5px solid green";

});





function led(id,on){

    document.getElementById(id).style.background =
    on ? "green" : "red";

}





function number(v){

    if(v===undefined || v===null)
        return "--";

    return Number(v).toFixed(1);

}





function updateOutput(id,state){

    let e =
    document.getElementById(id);


    if(state){

        e.className =
        "card button on";


        e.querySelector(".value").innerHTML =
        "ON";

    }
    else{

        e.className =
        "card button off";


        e.querySelector(".value").innerHTML =
        "OFF";

    }

}





client.on("message",(topic,msg)=>{


    let d;


    try{

        d =
        JSON.parse(msg);

    }

    catch(e){

        return;

    }




    // ESTADOS

    led(
        "ledWifi",
        d.wifi=="OK"
    );


    led(
        "ledMQTT",
        d.mqtt=="OK"
    );


    led(
        "ledBT",
        d.bt=="OK"
    );





    // GPS

    document.getElementById("lat").innerHTML =
    d.lat ?? "--";


    document.getElementById("lon").innerHTML =
    d.lon ?? "--";



    document.getElementById("gps").innerHTML =
    d.gps ?
    "GPS OK" :
    "GPS SIN SEÑAL";





    // VIENTO

    document.getElementById("wind").innerHTML =
    number(
        d.wind_speed
    );



    document.getElementById("angle").innerHTML =
    Math.round(
        d.wind_angle ?? 0
    );




    // PROFUNDIDAD

    document.getElementById("depth").innerHTML =
    number(
        d.depth
    );





    // BATERIAS


    let bm =
    document.getElementById("bat_m");


    let bs =
    document.getElementById("bat_s");


    let bb =
    document.getElementById("bat_b");




    bm.innerHTML =
    number(d.bat_m)
    +" V";


    bs.innerHTML =
    number(d.bat_s)
    +" V";


    bb.innerHTML =
    number(d.bat_b)
    +" V";





    bm.className =
    d.alarm_m ?
    "value alarm":
    "value";


    bs.className =
    d.alarm_s ?
    "value alarm":
    "value";


    bb.className =
    d.alarm_b ?
    "value alarm":
    "value";





    // TEMPERATURA AGUA

    document.getElementById("temp").innerHTML =
    number(
        d.water_temp
    );





    // SALIDAS

    updateOutput(
        "gen",
        d.out1
    );


    updateOutput(
        "inst",
        d.out2
    );


    updateOutput(
        "luz",
        d.out3
    );



});






function command(output,state){


    client.publish(

        "boat/cmd",

        JSON.stringify({

            [output]:state

        })

    );


}





document.getElementById("gen").onclick =
()=>command(
    "out1",
    true
);



document.getElementById("inst").onclick =
()=>command(
    "out2",
    true
);



document.getElementById("luz").onclick =
()=>command(
    "out3",
    true
);



</script>


</body>

</html>
