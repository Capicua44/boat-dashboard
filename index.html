<script>
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");
    
    // Objeto para guardar el estado anterior y comparar
    let lastData = {};

    client.on("connect", () => {
        console.log("MQTT conectado");
        client.subscribe("boat/data");
    });

    // Función auxiliar para actualizar solo si cambió
    function updateIfChanged(id, newValue, formatter = (v) => v) {
        let el = document.getElementById(id);
        let formattedValue = formatter(newValue);
        if (el.innerHTML !== formattedValue) {
            el.innerHTML = formattedValue;
        }
    }

    client.on("message", (topic, msg) => {
        let d;
        try { d = JSON.parse(msg.toString()); } catch(e) { return; }

        // 1. LEDs (Estado de conexión)
        led("ledWifi", d.wifi == "OK");
        led("ledMQTT", d.mqtt == "OK");
        led("ledBT", d.bt == "OK");

        // 2. Datos Variables (GPS, Viento, Baterías, Temperatura)
        // Solo actualiza si el valor es diferente al anterior
        if (lastData.lat != d.lat) updateIfChanged("lat", d.lat);
        if (lastData.lon != d.lon) updateIfChanged("lon", d.lon);
        updateIfChanged("gps", d.gps ? "GPS OK" : "GPS SIN SEÑAL");
        updateIfChanged("wind", number(d.wind_speed));
        updateIfChanged("angle", Math.round(d.wind_angle ?? 0));
        updateIfChanged("depth", number(d.depth));
        updateIfChanged("temp", number(d.water_temp));

        // Baterías y Alarmas
        updateBattery("bat_m", d.bat_m, d.alarm_m);
        updateBattery("bat_s", d.bat_s, d.alarm_s);
        updateBattery("bat_b", d.bat_b, d.alarm_b);

        // 3. Botones (Solo si el estado cambió)
        if (lastData.out1 !== d.out1) updateOutput("gen", d.out1);
        if (lastData.out2 !== d.out2) updateOutput("inst", d.out2);
        if (lastData.out3 !== d.out3) updateOutput("luz", d.out3);

        lastData = d; // Guardamos el estado actual como el nuevo "anterior"
    });

    function updateBattery(id, val, alarm) {
        let el = document.getElementById(id);
        let formatted = number(val) + " V";
        let newClass = alarm ? "value alarm" : "value";
        
        if (el.innerHTML !== formatted || el.className !== newClass) {
            el.innerHTML = formatted;
            el.className = newClass;
        }
    }

    // Funciones originales que mantienes
    function led(id, state) { 
        let e = document.getElementById(id);
        let color = state ? "green" : "red";
        if(e.style.background !== color) e.style.background = color; 
    }

    function number(v) { return (v === undefined || v === null) ? "--" : Number(v).toFixed(1); }

    function updateOutput(id, state) {
        let e = document.getElementById(id);
        e.className = state ? "card button on" : "card button off";
        e.querySelector(".value").innerHTML = state ? "ON" : "OFF";
    }

    function command(cmd, state) {
        client.publish("boat/cmd", JSON.stringify({ "cmd": cmd, "value": state }));
    }

    document.getElementById("gen").onclick = () => command("out1", !lastData.out1);
    document.getElementById("inst").onclick = () => command("out2", !lastData.out2);
    document.getElementById("luz").onclick = () => command("out3", !lastData.out3);
</script>
