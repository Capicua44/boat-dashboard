<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel Capicua</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body { margin:0; font-family:Arial,sans-serif; background:#63c7e8; color:#003344; }
.header { background:#005b75; color:white; text-align:center; padding:15px; font-size:24px; font-weight:bold; }
.connection { display:flex; justify-content:center; gap:15px; margin:12px; flex-wrap:wrap; }
.conn { background:white; padding:8px 12px; border-radius:12px; font-weight:bold; }
.led { width:12px; height:12px; display:inline-block; border-radius:50%; background:red; margin-right:5px; }
.card { background:white; margin:8px; padding:10px; border-radius:14px; text-align:center; box-shadow:0 2px 5px #777; }
.title { font-size:13px; color:#006080; font-weight:bold; }
.value { font-size:25px; font-weight:bold; color:#008000; margin-top:5px; }
.row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.row .card { flex:1; min-width:90px; }
.alarm { color:red !important; }
.button { background:#006080; color:white; cursor:pointer; }
/* Botón ON Amarillo Intenso */
.button.on { background:#FFD700; color:#000; }
/* Botón OFF Gris Claro */
.button.off { background:#AAAAAA; color:#FFFFFF; }
.statusGPS { font-weight:bold; color:#008000; }
</style>
</head>

<body>

<div class="header">⛵ PANEL CAPICUA</div>

<div class="connection">
<div class="conn"><span id="ledWifi" class="led"></span>WiFi ESP32</div>
<div class="conn"><span id="ledMQTT" class="led"></span>MQTT ESP32</div>
<div class="conn"><span id="ledBT" class="led"></span>Bluetooth MiniPlex</div>
</div>

<div class="card">
<div class="title">GPS</div>
<div class="row">
<div class="card"><div class="title">LATITUD</div><div class="value" id="lat">--</div></div>
<div class="card"><div class="title">LONGITUD</div><div class="value" id="lon">--</div></div>
</div>
<div id="gps" class="statusGPS">--</div>
</div>

<div class="row">
<div class="card"><div class="title">VIENTO</div><div class="value"><span id="wind">--</span> kt</div></div>
<div class="card"><div class="title">ANGULO</div><div class="value"><span id="angle">--</span>°</div></div>
<div class="card"><div class="title">PROFUNDIDAD</div><div class="value"><span id="depth">--</span> m</div></div>
</div>

<div class="row">
<div class="card"><div class="title">MOTOR</div><div class="value" id="bat_m">--</div></div>
<div class="card"><div class="title">SERVICIO</div><div class="value" id="bat_s">--</div></div>
<div class="card"><div class="title">PROA</div><div class="value" id="bat_b">--</div></div>
</div>

<div class="card"><div class="title">TEMPERATURA AGUA</div><div class="value"><span id="temp">--</span> °C</div></div>

<div class="row">
<div class="card button off" id="gen"><div class="title">GEN</div><div class="value">OFF</div></div>
<div class="card button off" id="inst"><div class="title">INST</div><div class="value">OFF</div></div>
<div class="card button off" id="luz"><div class="title">LUZ TOP</div><div class="value">OFF</div></div>
</div>

<script>
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect",()=>{
    console.log("MQTT conectado");
    client.subscribe("boat/data");
});

function led(id,state) { document.getElementById(id).style.background = state ? "green" : "red"; }

function number(v) {
    if(v===undefined || v===null) return "--";
    return Number(v).toFixed(1);
}

function updateOutput(id,state) {
    let e = document.getElementById(id);
    if(state) {
        e.className = "card button on";
        e.querySelector(".value").innerHTML = "ON";
    } else {
        e.className = "card button off";
        e.querySelector(".value").innerHTML = "OFF";
    }
}

client.on("message",(topic,msg)=>{
    let d;
    try { d = JSON.parse(msg.toString()); } catch(e) { return; }
    
    led("ledWifi", d.wifi=="OK");
    led("ledMQTT", d.mqtt=="OK");
    led("ledBT", d.bt=="OK");

    document.getElementById("lat").innerHTML = d.lat ?? "--";
    document.getElementById("lon").innerHTML = d.lon ?? "--";
    document.getElementById("gps").innerHTML = d.gps ? "GPS OK" : "GPS SIN SEÑAL";

    document.getElementById("wind").innerHTML = number(d.wind_speed);
    document.getElementById("angle").innerHTML = Math.round(d.wind_angle ?? 0);
    document.getElementById("depth").innerHTML = number(d.depth);

    let bm = document.getElementById("bat_m");
    let bs = document.getElementById("bat_s");
    let bb = document.getElementById("bat_b");

    bm.innerHTML = number(d.bat_m) +" V";
    bs.innerHTML = number(d.bat_s) +" V";
    bb.innerHTML = number(d.bat_b) +" V";

    bm.className = d.alarm_m ? "value alarm": "value";
    bs.className = d.alarm_s ? "value alarm": "value";
    bb.className = d.alarm_b ? "value alarm": "value";

    document.getElementById("temp").innerHTML = number(d.water_temp);

    updateOutput("gen", d.out1);
    updateOutput("inst", d.out2);
    updateOutput("luz", d.out3);
});

function command(cmd, state) {
    client.publish("boat/cmd", JSON.stringify({ "cmd": cmd, "value": state }));
}

document.getElementById("gen").onclick = () => command("out1", !document.getElementById("gen").classList.contains("on"));
document.getElementById("inst").onclick = () => command("out2", !document.getElementById("inst").classList.contains("on"));
document.getElementById("luz").onclick = () => command("out3", !document.getElementById("luz").classList.contains("on"));
</script>

</body>
</html>
