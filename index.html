<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Náutico</title>

<meta name="theme-color" content="#0b1220">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.header {
  background: #0f1b33;
  padding: 14px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #00d4ff;
}

.status {
  margin: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-weight: bold;
  background: #1a2d4d;
}

.online { color: #00ff99; }
.offline { color: #ff4d4d; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: #142642;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
}

.title { font-size: 12px; color: #aaa; }
.value { font-size: 22px; color: #00ff99; font-weight: bold; }

.compass {
  width: 150px;
  height: 150px;
  margin: 10px auto;
  border-radius: 50%;
  border: 3px solid #00d4ff;
  background: #0f1b33;
  position: relative;
}

#needle {
  position: absolute;
  width: 2px;
  height: 65px;
  background: red;
  top: 50%;
  left: 50%;
  transform-origin: bottom center;
}

#centerDot {
  position: absolute;
  width: 7px;
  height: 7px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.alarm {
  margin: 10px;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: #1a2d4d;
}

.danger {
  background: #ff2d2d;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">⛵ PAINEL NÁUTICO</div>

<div id="status" class="status offline">OFFLINE</div>

<!-- COMPASS / VENTO RELATIVO -->
<div class="card">
  <div class="title">Vento relativo à proa</div>

  <div class="compass">
    <div id="needle"></div>
    <div id="centerDot"></div>
  </div>

  <div class="value" id="heading">--</div>
</div>

<!-- ALARME GLOBAL -->
<div id="alarm" class="alarm">Sistema OK</div>

<div class="grid">

  <div class="card">
    <div class="title">Latitude</div>
    <div id="lat" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Longitude</div>
    <div id="lon" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Velocidade Vento</div>
    <div id="ws" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Temperatura Água</div>
    <div id="temp" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Profundidade</div>
    <div id="depth" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Bateria Motor</div>
    <div id="bat_m" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Bateria Serviço</div>
    <div id="bat_s" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Bateria Proa</div>
    <div id="bat_b" class="value">--</div>
  </div>

</div>

<script>

//==============================
// MQTT CONNECT
//==============================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect", () => {
  console.log("MQTT conectado");
  client.subscribe("boat/data");
});

//==============================
// BÚSSOLA RELATIVA
//==============================
function updateCompass(h) {

  document.getElementById("heading").innerHTML = h.toFixed(0) + "°";

  // 0° = proa, +90 = boreste, -90 = bombordo
  document.getElementById("needle").style.transform =
    "translate(-50%, -100%) rotate(" + h + "deg)";
}

//==============================
// ALARME BATERIAS
//==============================
function checkBattery(m, s, b) {

  const alarm = document.getElementById("alarm");

  if(m < 11.8 || s < 11.8 || b < 11.8) {
    alarm.className = "alarm danger";
    alarm.innerHTML = "⚠ BAIXA TENSÃO DETECTADA";
  } else {
    alarm.className = "alarm";
    alarm.innerHTML = "Sistema OK";
  }
}

//==============================
// MQTT RECEIVE
//==============================
client.on("message", (topic, msg) => {

  let data;
  try {
    data = JSON.parse(msg.toString());
  } catch(e) {
    return;
  }

  document.getElementById("status").innerHTML = "ONLINE";
  document.getElementById("status").className = "status online";

  // GPS
  document.getElementById("lat").innerHTML = data.lat?.toFixed(6) ?? "--";
  document.getElementById("lon").innerHTML = data.lon?.toFixed(6) ?? "--";

  // SENSOR
  document.getElementById("ws").innerHTML = data.ws?.toFixed(1) ?? "--";
  document.getElementById("temp").innerHTML = data.temp?.toFixed(1) ?? "--";
  document.getElementById("depth").innerHTML = data.depth?.toFixed(1) ?? "--";

  // BATERIAS
  document.getElementById("bat_m").innerHTML = data.bat_m?.toFixed(2) ?? "--";
  document.getElementById("bat_s").innerHTML = data.bat_s?.toFixed(2) ?? "--";
  document.getElementById("bat_b").innerHTML = data.bat_bow?.toFixed(2) ?? "--";

  // COMPASS / VENTO RELATIVO
  updateCompass(data.wd ?? 0);

  // ALARMES
  checkBattery(data.bat_m, data.bat_s, data.bat_bow);
});

//==============================
// SW (DESATIVADO PARA EVITAR BUG)
//==============================
// navigator.serviceWorker.register('sw.js');

</script>

</body>
</html>
