<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Náutico</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.header {
  background: #0f1b33;
  padding: 14px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #00d4ff;
}

.status {
  margin: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-weight: bold;
  background: #1a2d4d;
}

.online { color: #00ff99; }
.offline { color: #ff4d4d; }

.card {
  background: #142642;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  margin: 10px;
}

.title { font-size: 12px; color: #aaa; }
.value { font-size: 22px; color: #00ff99; font-weight: bold; }

/* COMPASS */
.compass {
  width: 160px;
  height: 160px;
  margin: 10px auto;
  border-radius: 50%;
  border: 3px solid #00d4ff;
  background: #0f1b33;
  position: relative;
}

#needle {
  position: absolute;
  width: 2px;
  height: 70px;
  background: red;
  top: 50%;
  left: 50%;
  transform-origin: bottom center;
}

#centerDot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.windBox {
  text-align: center;
  margin-top: 8px;
  color: #00d4ff;
}

.alarm {
  margin: 10px;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: #1a2d4d;
}

.danger {
  background: #ff2d2d;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">⛵ PAINEL NÁUTICO</div>

<div id="status" class="status offline">OFFLINE</div>

<!-- BÚSSOLA -->
<div class="card">
  <div class="title">Bússola</div>

  <div class="compass">
    <div id="needle"></div>
    <div id="centerDot"></div>
  </div>

  <div class="value" id="heading">--</div>

  <div class="windBox">
    Vento: <span id="wsTop">--</span> kt
  </div>
</div>

<div id="alarm" class="alarm">Sistema OK</div>

<!-- DADOS -->
<div class="card">Latitude: <div class="value" id="lat">--</div></div>
<div class="card">Longitude: <div class="value" id="lon">--</div></div>
<div class="card">Temperatura: <div class="value" id="temp">--</div></div>
<div class="card">Profundidade: <div class="value" id="depth">--</div></div>

<div class="card">Bateria Motor: <div class="value" id="bat_m">--</div></div>
<div class="card">Bateria Serviço: <div class="value" id="bat_s">--</div></div>
<div class="card">Bateria Proa: <div class="value" id="bat_bow">--</div></div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect", () => {
  document.getElementById("status").innerHTML = "ONLINE";
  document.getElementById("status").className = "status online";

  client.subscribe("boat/data");
  client.subscribe("boat/status");
});

/* ---------------- SAFE FORMAT ---------------- */
function fmt(v, d=1) {
  if (v === undefined || v === null || v === "") return "--";

  let n = Number(v);
  if (isNaN(n)) return "--";

  return n.toFixed(d);
}

/* ---------------- COMPASS NORMALIZATION ---------------- */
function normalize(h) {
  return ((h + 180) % 360) - 180;
}

/* ---------------- BATTERY ALARM ---------------- */
function checkBattery(m, s, b) {
  const alarm = document.getElementById("alarm");

  if(m < 11.8 || s < 11.8 || b < 11.8) {
    alarm.className = "alarm danger";
    alarm.innerHTML = "⚠ BAIXA TENSÃO!";
  } else {
    alarm.className = "alarm";
    alarm.innerHTML = "Sistema OK";
  }
}

/* ---------------- MQTT ---------------- */
client.on("message", (topic, msg) => {

  if(topic === "boat/status") return;

  let d;
  try {
    d = JSON.parse(msg.toString());
  } catch(e) {
    return;
  }

  /* GPS */
  document.getElementById("lat").innerHTML = fmt(d.lat, 6);
  document.getElementById("lon").innerHTML = fmt(d.lon, 6);

  /* sensors */
  document.getElementById("wsTop").innerHTML = fmt(d.ws, 1);
  document.getElementById("temp").innerHTML = fmt(d.temp, 1);
  document.getElementById("depth").innerHTML = fmt(d.depth, 1);

  /* batteries */
  document.getElementById("bat_m").innerHTML = fmt(d.bat_m, 2);
  document.getElementById("bat_s").innerHTML = fmt(d.bat_s, 2);
  document.getElementById("bat_bow").innerHTML = fmt(d.bat_bow, 2);

  /* COMPASS FIX (REAL LOGIC) */
  let headingRaw = d.heading ?? d.cog ?? d.wd ?? 0;
  let h = normalize(Number(headingRaw));

  document.getElementById("heading").innerHTML = h.toFixed(0) + "°";

  document.getElementById("needle").style.transform =
    "rotate(" + h + "deg) translateX(-50%)";

  /* alarm */
  checkBattery(d.bat_m, d.bat_s, d.bat_bow);
});

</script>

</body>
</html>
