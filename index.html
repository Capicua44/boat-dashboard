<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Náutico</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body {
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}


.header {
  background:#0f1b33;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#00d4ff;
}


.status {
  margin:10px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
  background:#1a2d4d;
}


.online {
  color:#00ff99;
}


.offline {
  color:#ff4d4d;
}



.card {

  background:#142642;

  margin:10px;

  padding:14px;

  border-radius:14px;

  text-align:center;

}



.title {

 font-size:12px;

 color:#aaa;

}



.value {

 font-size:22px;

 font-weight:bold;

 color:#00ff99;

}



.grid3 {

 display:grid;

 grid-template-columns:
 repeat(3,1fr);

 gap:8px;

}



.grid2 {

 display:grid;

 grid-template-columns:
 repeat(2,1fr);

 gap:8px;

}



.box {

 background:#0f1b33;

 padding:10px;

 border-radius:10px;

}



.label {

 color:#aaa;

 font-size:12px;

}



.alarm {

 color:#ff3333 !important;

}



button {

 width:100%;

 padding:12px 5px;

 border:0;

 border-radius:10px;

 background:#34495e;

 color:white;

 font-weight:bold;

 font-size:14px;

}



.buttonOn {

 background:#00a86b;

}



</style>

</head>


<body>


<div class="header">
⛵ PAINEL NÁUTICO
</div>



<div id="status" class="status offline">
OFFLINE
</div>
