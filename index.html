<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Náutico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* HEADER */
.header {
  background: #0f1b33;
  padding: 14px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #00d4ff;
}

/* STATUS */
.status {
  margin: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-weight: bold;
  background: #1a2d4d;
}

.online { color: #00ff99; }
.offline { color: #ff4d4d; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: #142642;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.title {
  font-size: 12px;
  color: #aaa;
}

.value {
  font-size: 22px;
  color: #00ff99;
  font-weight: bold;
  margin-top: 5px;
}

/* COMPASS */
.compass {
  width: 180px;
  height: 180px;
  margin: 10px auto;
  border-radius: 50%;
  border: 3px solid #00d4ff;
  background: #0f1b33;
  position: relative;
}

/* ponteiro fino */
#needle {
  position: absolute;
  width: 2px;
  height: 80px;
  background: red;
  top: 50%;
  left: 50%;
  transform-origin: bottom center;
  transform: rotate(0deg) translateX(-50%);
}

/* centro */
#centerDot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

/* ALARME */
.alarm {
  margin: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  background: #1a2d4d;
}

.danger {
  background: #ff2d2d;
  color: white;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="header">⛵ PAINEL NÁUTICO</div>

<div id="status" class="status offline">OFFLINE</div>

<!-- COMPASS -->
<div class="card">
  <div class="title">Bússola (Proa = 0°)</div>

  <div class="compass">
    <div id="needle"></div>
    <div id="centerDot"></div>
  </div>

  <div class="value" id="heading">--</div>
</div>

<!-- ALARME -->
<div id="alarm" class="alarm">Sistema OK</div>

<!-- GRID -->
<div class="grid">

  <div class="card">
    <div class="title">Latitude</div>
    <div id="lat" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Longitude</div>
    <div id="lon" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Vento (kt)</div>
    <div id="ws" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Direção do Vento</div>
    <div id="wd" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Profundidade</div>
    <div id="depth" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">RSSI</div>
    <div id="rssi" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Bateria Motor</div>
    <div id="bat_m" class="value">--</div>
  </div>

  <div class="card">
    <div class="title">Bateria Serviço</div>
    <div id="bat_s" class="value">--</div>
  </div>

</div>

<script>

//==============================
// MQTT
//==============================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect", () => {
  client.subscribe("boat/data");
  client.subscribe("boat/status");
});

//==============================
// BÚSSOLA
//==============================
function updateCompass(h) {
  document.getElementById("heading").innerHTML = h.toFixed(0) + "°";

  document.getElementById("needle").style.transform =
    "rotate(" + h + "deg) translateX(-50%)";
}

//==============================
// ALARME
//==============================
function checkBattery(motor, service) {

  const alarm = document.getElementById("alarm");

  if(motor < 11.8 || service < 11.8) {
    alarm.className = "alarm danger";
    alarm.innerHTML = "⚠ BAIXA TENSÃO DETECTADA";
  } else {
    alarm.className = "alarm";
    alarm.innerHTML = "Sistema OK";
  }
}

//==============================
// MQTT RECEIVE
//==============================
client.on("message", (topic, msg) => {

  const text = msg.toString();

  // STATUS
  if(topic === "boat/status") {
    const el = document.getElementById("status");

    if(text === "ONLINE") {
      el.innerHTML = "ONLINE";
      el.className = "status online";
    } else {
      el.innerHTML = "OFFLINE";
      el.className = "status offline";
    }
    return;
  }

  // DATA
  try {

    const data = JSON.parse(text);

    document.getElementById("ws").innerHTML = data.ws?.toFixed(1) ?? "--";
    document.getElementById("wd").innerHTML = data.wd?.toFixed(0) ?? "--";
    document.getElementById("depth").innerHTML = data.depth?.toFixed(1) ?? "--";
    document.getElementById("rssi").innerHTML = data.rssi ?? "--";

    document.getElementById("bat_m").innerHTML = data.bat_m?.toFixed(2) ?? "--";
    document.getElementById("bat_s").innerHTML = data.bat_s?.toFixed(2) ?? "--";

    document.getElementById("lat").innerHTML = data.lat?.toFixed(6) ?? "--";
    document.getElementById("lon").innerHTML = data.lon?.toFixed(6) ?? "--";

    updateCompass(data.heading ?? data.wd ?? 0);

    checkBattery(data.bat_m ?? 0, data.bat_s ?? 0);

  } catch(e) {
    console.log("Erro JSON", e);
  }

});

//==============================
// PWA
//==============================
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
