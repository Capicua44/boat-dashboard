<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Velero</title>
    
    <style>
        /* ========================================== */
        /* 1. AQUÍ VAN TUS ESTILOS (CSS) ORIGINALES   */
        /* Pega aquí tus colores, fondos y diseño     */
        /* ========================================== */
        
    </style>

    <!-- ========================================== -->
    <!-- 2. ESTA ES LA LÍNEA QUE SOLUCIONA EL ERROR -->
    <!-- Descarga MQTT ANTES de ejecutar tu script  -->
    <!-- ========================================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

</head>
<body>

    <!-- ========================================== -->
    <!-- 3. AQUÍ VA TU DISEÑO HTML (LOS BOTONES)    -->
    <!-- Pega aquí todos tus <div id="bat_m"> etc.  -->
    <!-- ========================================== -->
    


    <!-- ========================================== -->
    <!-- 4. TU SCRIPT OPTIMIZADO (NO TOCAR)         -->
    <!-- ========================================== -->
    <script>
        // Aquí mqtt ya está definido porque la librería se cargó arriba
        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");
        let lastData = {};
        let lastUpdateTimestamp = 0; 

        client.on("connect", () => {
            console.log("Conectado al Broker MQTT"); // Mensaje para ver en consola
            client.subscribe("boat/data");
        });

        client.on("message", (topic, msg) => {
            const now = Date.now();
            if (now - lastUpdateTimestamp < 100) return; 
            lastUpdateTimestamp = now;

            let d;
            try { d = JSON.parse(msg.toString()); } catch(e) { return; }

            updateIfChanged("lat", d.lat);
            updateIfChanged("lon", d.lon);
            
            updateIfChanged("gps", d.gps ? "GPS OK" : "GPS SIN SEÑAL");
            updateIfChanged("wind", formatVal(d.wind_speed));
            updateIfChanged("angle", Math.round(d.wind_angle ?? 0));
            updateIfChanged("depth", formatVal(d.depth));
            updateIfChanged("temp", formatVal(d.water_temp));

            updateBattery("bat_m", d.bat_m, d.alarm_m);
            updateBattery("bat_s", d.bat_s, d.alarm_s);
            updateBattery("bat_b", d.bat_b, d.alarm_b);

            if (lastData.out1 !== d.out1) updateOutput("gen", d.out1);
            if (lastData.out2 !== d.out2) updateOutput("inst", d.out2);
            if (lastData.out3 !== d.out3) updateOutput("luz", d.out3);
            
            led("ledWifi", d.wifi == "OK");
            led("ledMQTT", d.mqtt == "OK");
            led("ledBT", d.bt == "OK");

            lastData = d;
        });

        function updateIfChanged(id, val) {
            let el = document.getElementById(id);
            if (el && el.innerHTML !== String(val)) el.innerHTML = val;
        }

        function updateBattery(id, val, alarm) {
            let el = document.getElementById(id);
            let formatted = (val !== undefined && val !== null) ? val + " V" : "-- V";
            let newClass = alarm ? "value alarm" : "value";
            
            if (el && (el.innerHTML !== formatted || el.className !== newClass)) {
                el.innerHTML = formatted;
                el.className = newClass;
            }
        }

        function led(id, state) { 
            let e = document.getElementById(id);
            if (e) e.style.background = state ? "green" : "red"; 
        }

        function formatVal(v) { 
            return (v === undefined || v === null) ? "--" : Number(v).toFixed(1); 
        }

        function updateOutput(id, state) {
            let e = document.getElementById(id);
            if(!e) return;
            e.className = state ? "card button on" : "card button off";
            e.querySelector(".value").innerHTML = state ? "ON" : "OFF";
        }
    </script>
</body>
</html>
